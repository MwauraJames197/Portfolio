<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="#about"><span id="nav-first-name">James</span> <span id="nav-last-name">Mwaura</span></a>
    <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">☰</button>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <div class="nav-social" id="nav-social"></div>
  </nav>

  <section id="about">
    <div class="hero-text">
      <p class="hero-eyebrow" id="hero-eyebrow"></p>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-bio" id="hero-bio"></p>
      <div class="hero-contact" id="hero-buttons"></div>
    </div>
    <div class="hero-portrait-wrap">
      <img id="hero-portrait" src="" alt="Portrait" class="hero-portrait" onerror="this.style.display='none'" />
    </div>
  </section>

  <section id="projects">
    <p class="section-label reveal">Selected Work</p>
    <h2 class="section-title reveal">Projects</h2>
    <hr class="section-divider" />
    <div class="projects-grid" id="projects-grid"></div>
  </section>

  <section id="experience">
    <p class="section-label reveal">Background</p>
    <h2 class="section-title reveal">Experience</h2>
    <hr class="section-divider" />
    <div class="exp-grid">
      <div class="exp-block reveal">
        <h3>Education</h3>
        <div id="education-list"></div>
        <h3 class="spaced-title">Employment</h3>
        <div id="employment-list"></div>
        <div class="resume-row" id="resume-row"></div>
      </div>
      <div class="exp-block reveal">
        <h3>Technical Skills</h3>
        <div class="skills-list" id="skills-list"></div>
      </div>
    </div>
  </section>

  <section id="contact">
    <p class="section-label">Get In Touch</p>
    <h2 class="section-title">Contact</h2>
    <p class="contact-text" id="contact-text"></p>
    <div class="contact-links" id="contact-links"></div>
  </section>

  <footer id="footer"></footer>

  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close" onclick="closeLightbox()">×</span>
    <img id="lightbox-img" src="" alt="Project detail" onclick="event.stopPropagation()" />
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
